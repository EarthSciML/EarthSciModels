baseURL = "https://earthsciml.github.io/EarthSciModels/"
languageCode = "en-us"
title = "EarthSciModels — Component Catalog"
# No theme — layouts are provided directly under layouts/.

# Use docs/ as the site root when building from this repo.
# CI invokes `hugo --source docs --minify --destination public`.

enableGitInfo = true
enableRobotsTXT = true

[params]
  description = "Browsable catalog of .esm Earth-science model components."
  repoURL = "https://github.com/EarthSciML/EarthSciModels"
  # Pagefind UI: mounted in layouts/partials/header.html. The index is built
  # as a CI post-step (`pagefind --site public`) and ships under /pagefind/.
  pagefind = true

# Taxonomies drive the faceted navigation. Each key is the singular name of
# a frontmatter field; the value is the plural used in the URL
# (/domains/gaschem/, /component_types/model/, ...).
[taxonomies]
  domain = "domains"
  component_type = "component_types"
  subdomain = "subdomains"
  tag = "tags"

[markup]
  [markup.goldmark.renderer]
    # Allow raw HTML in generated markdown (<details> blocks).
    unsafe = true
  [markup.highlight]
    style = "github"
    lineNos = false
    codeFences = true

[outputs]
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]
