<header class="site-header">
  <nav>
    <a class="brand" href="{{ site.Home.RelPermalink }}">{{ site.Title }}</a>
    <ul class="nav-links">
      <li><a href="{{ "components/" | relURL }}">Components</a></li>
      <li><a href="{{ "domains/" | relURL }}">Domains</a></li>
      <li><a href="{{ "component_types/" | relURL }}">Types</a></li>
      <li><a href="{{ site.Params.repoURL }}">GitHub</a></li>
    </ul>
  </nav>
  {{ if site.Params.pagefind }}
    <div id="search"></div>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        if (window.PagefindUI) {
          new PagefindUI({ element: '#search', showImages: false });
        }
      });
    </script>
  {{ end }}
</header>
