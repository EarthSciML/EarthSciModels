---
name: docs

on:
  push:
    branches: [main]
    paths:
      - 'components/**'
      - 'tools/esm_to_docs.py'
      - 'tools/esm_to_docs_test.py'
      - 'tools/render_example_plots.py'
      - 'tools/render_example_plots_test.py'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'components/**'
      - 'tools/esm_to_docs.py'
      - 'tools/esm_to_docs_test.py'
      - 'tools/render_example_plots.py'
      - 'tools/render_example_plots_test.py'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Coalesce concurrent runs on the same ref. On PR branches the latest push
# supersedes earlier in-flight runs (the usual GHA pattern). On main we let
# runs queue but each runs to completion — `cancel-in-progress: false` —
# because every main commit is a merge whose docs build (and Pages deploy)
# must be independently verified rather than skipped (mirrors test-esm.yml
# after esm-g97l; cancelling on main produced a docs cascade where every
# push killed the in-flight run before it could finish, leaving Pages stale
# — esm-m0r2).
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.131.0"
      PAGEFIND_VERSION: "1.1.0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python plotting deps
        run: |
          python -m pip install --upgrade matplotlib numpy scipy sympy
          # Clone the toolkit source so we can both pip-install it and copy
          # its bundled schema into the installed package. The toolkit's
          # pyproject.toml currently omits package-data for data/esm-schema.json,
          # so a plain `pip install` ships the package without the schema and
          # `load()` then raises "ESM schema not found". Drop this workaround
          # once EarthSciSerialization's pyproject declares the data file.
          git clone --depth=1 https://github.com/EarthSciML/EarthSciSerialization.git /tmp/ess
          python -m pip install /tmp/ess/packages/earthsci_toolkit
          INSTALLED_DIR=$(python -c 'import earthsci_toolkit, os; print(os.path.dirname(earthsci_toolkit.__file__))')
          mkdir -p "$INSTALLED_DIR/data"
          cp /tmp/ess/packages/earthsci_toolkit/src/earthsci_toolkit/data/esm-schema.json "$INSTALLED_DIR/data/"

      - name: Install Hugo extended
        run: |
          curl -sSL \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin hugo

      - name: Unit test the generators
        run: |
          python -m unittest tools/esm_to_docs_test.py
          python -m unittest tools/render_example_plots_test.py

      - name: Render example plots from .esm
        run: python tools/render_example_plots.py

      - name: Generate component pages from .esm
        run: python tools/esm_to_docs.py

      - name: Build site with Hugo
        run: hugo --source docs --minify --destination public

      - name: Install Pagefind
        run: npm install -g "pagefind@${PAGEFIND_VERSION}"

      - name: Build Pagefind search index
        run: pagefind --site docs/public

      # Hugo emits root-relative hrefs of the form /EarthSciModels/...
      # because the GitHub-Pages baseURL has that path component. The local
      # build tree lives at docs/public/, so we stage it under a parent dir
      # that mirrors the deployed path layout. Lychee's --root-dir then
      # resolves those hrefs to real files. Absolute paths are required —
      # lychee 0.23+ rejects relative --base/--root-dir values.
      - name: Stage built site for link-checking
        run: |
          rm -rf /tmp/lychee-root
          mkdir -p /tmp/lychee-root/EarthSciModels
          cp -r docs/public/. /tmp/lychee-root/EarthSciModels/

      # Internal-link guard: catches the class of bug where a Hugo template
      # emits root-relative URLs that drop the project-Pages baseURL prefix
      # (e.g. href="/components/" instead of "/EarthSciModels/components/").
      # --offline + scheme excludes keep CI hermetic and free of third-party
      # rate-limit flake.
      - name: Check internal links (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --offline
            --no-progress
            --include-fragments
            --root-dir /tmp/lychee-root
            --exclude '^https?://'
            --exclude '^mailto:'
            '/tmp/lychee-root/EarthSciModels/**/*.html'
          fail: true
          format: detailed

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
