name: test-esm

on:
  push:
    branches: [main]
  pull_request:

jobs:
  julia-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - id: check_project
        run: |
          if [ -f Project.toml ]; then
            echo "has_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_project=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Project.toml yet — skipping Julia tests until the shim lands (mdl-8y7)."
          fi
      - uses: julia-actions/setup-julia@v2
        if: steps.check_project.outputs.has_project == 'true'
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
        if: steps.check_project.outputs.has_project == 'true'
      # EarthSciSerialization is not yet in the General registry. The setup
      # script falls back to Pkg.add(url=..., rev="main") when no local
      # checkout is present (which is the case in CI). It is the same script
      # polecats run locally — see docs/migration-guide.md (mdl-cac).
      - name: Resolve unregistered deps (EarthSciSerialization)
        if: steps.check_project.outputs.has_project == 'true'
        run: scripts/setup_polecat_env.sh
      # Smoke test: fail fast here (with a clear message) if the URL-fallback
      # resolution is broken, so we don't blame downstream build/test steps.
      - name: Smoke test EarthSciSerialization resolution
        if: steps.check_project.outputs.has_project == 'true'
        run: julia --project=. -e 'using EarthSciSerialization; println(pathof(EarthSciSerialization))'
      - uses: julia-actions/julia-buildpkg@v1
        if: steps.check_project.outputs.has_project == 'true'
      # Pkg.test runs test/runtests.jl, which exercises:
      #   - the Julia shim's unit tests (mdl-8y7), and
      #   - run_esm_tests over models/, reaction_systems/, operators/,
      #     data_loaders/, coupling/, interfaces/ — every inline test in every
      #     committed .esm file (mdl-08t).
      - uses: julia-actions/julia-runtest@v1
        if: steps.check_project.outputs.has_project == 'true'
      # Standalone runner pass that emits a junit-xml summary into the job
      # output, independently of the Pkg.test() Test.@testset machinery.
      # Surfaces a per-file pass/fail table in the action log.
      - name: ESM inline-test runner (junit)
        if: steps.check_project.outputs.has_project == 'true'
        run: |
          julia --project=. -e '
            using EarthSciModels
            using ModelingToolkit
            using Catalyst
            using OrdinaryDiffEqTsit5
            results, code = run_esm_tests(; junit_xml="esm-tests.xml", verbose=true)
            exit(code)
          '
      - name: Upload junit XML
        if: always() && steps.check_project.outputs.has_project == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: esm-inline-tests-junit
          path: esm-tests.xml
          if-no-files-found: ignore
