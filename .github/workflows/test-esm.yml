name: test-esm

on:
  push:
    branches: [main]
  pull_request:

# Coalesce concurrent runs on the same ref. On PR branches the latest push
# supersedes earlier in-flight runs (the usual GHA pattern). On main we let
# runs queue but each runs to completion — `cancel-in-progress: false` —
# because every main commit is a merge that should be independently verified
# (esm-g97l).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Python inline-test gate (mdl-w1j, promoted to required in mdl-lvu,
  # extended to all live-repo coverage in esm-g97l, made the sole CI gate
  # in esm-m0r2 — the Julia walker was removed because in-process MTK
  # builds do not scale to the live migration burst and were blowing job
  # timeouts even with ESM_TESTS_SKIP_LIVE_REPO).
  #
  # Walks components/**/*.esm and lib/**/*.esm (mdl-14s) and runs every inline
  # test through the canonical ESS Python runner
  # (earthsci_toolkit.simulation.simulate, cse=False). lib/*.esm files without
  # inline tests still get a load-only minimum-bar gate so structural drift
  # (e.g. mdl-pk3, mdl-97r in lib/solar.esm) is caught at PR time. One
  # subprocess per file (Python's per-process GC is the OOM guardrail; cf.
  # bead mdl-w1j scope and the esm-9ms phase-wise RSS diagnostic showing peak
  # 196 MB across geoschem_fullchem). 25-min hard cap stays under CI's 30-min
  # job timeout.
  #
  # This is the **gate of record** for live-repo inline tests. The 819-reaction
  # geoschem_fullchem.esm Catalyst → MTK build OOM-kills the 16 GB GHA runner
  # in-process, but this gate exercises it safely via per-file subprocess
  # (peak ~196 MB). Local devs still get full Julia coverage via `pkg test`
  # — see docs/migration-guide.md (mdl-cac).
  python-inline-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # Install the canonical Python runner from EarthSciSerialization main.
      # The package isn't on PyPI yet (matching the unregistered Julia state
      # handled by setup_polecat_env.sh).
      - name: Install earthsci_toolkit (from EarthSciSerialization main)
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "earthsci_toolkit @ git+https://github.com/EarthSciML/EarthSciSerialization.git@main#subdirectory=packages/earthsci_toolkit"
      - name: Run Python inline-test gate (cse=False, per-file subprocess)
        run: |
          python tools/run_esm_inline_tests.py --junit-xml python-esm-tests.xml
      - name: Upload junit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-esm-inline-tests-junit
          path: python-esm-tests.xml
          if-no-files-found: ignore
