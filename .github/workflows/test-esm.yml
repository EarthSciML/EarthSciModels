name: test-esm

on:
  push:
    branches: [main]
  pull_request:

jobs:
  julia-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - id: check_project
        run: |
          if [ -f Project.toml ]; then
            echo "has_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_project=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Project.toml yet — skipping Julia tests until the shim lands (mdl-8y7)."
          fi
      - uses: julia-actions/setup-julia@v2
        if: steps.check_project.outputs.has_project == 'true'
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
        if: steps.check_project.outputs.has_project == 'true'
      # EarthSciSerialization is not yet in the General registry. The setup
      # script falls back to Pkg.add(url=..., rev="main") when no local
      # checkout is present (which is the case in CI). It is the same script
      # polecats run locally — see docs/migration-guide.md (mdl-cac).
      - name: Resolve unregistered deps (EarthSciSerialization)
        if: steps.check_project.outputs.has_project == 'true'
        run: scripts/setup_polecat_env.sh
      # Smoke test: fail fast here (with a clear message) if the URL-fallback
      # resolution is broken, so we don't blame downstream build/test steps.
      - name: Smoke test EarthSciSerialization resolution
        if: steps.check_project.outputs.has_project == 'true'
        run: julia --project=. -e 'using EarthSciSerialization; println(pathof(EarthSciSerialization))'
      - uses: julia-actions/julia-buildpkg@v1
        if: steps.check_project.outputs.has_project == 'true'
      # Pkg.test runs test/runtests.jl, which exercises:
      #   - the Julia shim's unit tests (mdl-8y7), and
      #   - run_esm_tests over components/ — every inline test in every
      #     committed .esm file (mdl-08t).
      # ESM_TESTS_JUNIT_XML tells runtests.jl to emit a junit artifact in the
      # same pass. We can't run a second `julia --project=.` walker because
      # ModelingToolkit is a test-only dep (see mdl-89o).
      # ESM_TESTS_SKIP_PATTERNS skips files whose Julia/MTK build OOMs the
      # 16 GB GitHub runner — geoschem_fullchem.esm peaks at ~13 GB on a
      # single MTK pass (mdl-w1j root cause). The Python inline-test gate
      # (python-inline-tests job below) is the gate of record for the
      # skipped files (mdl-lvu).
      - uses: julia-actions/julia-runtest@v1
        if: steps.check_project.outputs.has_project == 'true'
        env:
          ESM_TESTS_JUNIT_XML: ${{ github.workspace }}/esm-tests.xml
          ESM_TESTS_SKIP_PATTERNS: components/gaschem/geoschem_fullchem.esm
      - name: Upload junit XML
        if: always() && steps.check_project.outputs.has_project == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: esm-inline-tests-junit
          path: esm-tests.xml
          if-no-files-found: ignore

  # Python inline-test gate (mdl-w1j).
  #
  # Walks components/**/*.esm and runs every inline test through the canonical
  # ESS Python runner (earthsci_toolkit.simulation.simulate, cse=False). One
  # subprocess per file (Python's per-process GC is the OOM guardrail; cf.
  # bead mdl-w1j scope and the esm-9ms phase-wise RSS diagnostic showing peak
  # 196 MB across geoschem_fullchem). 25-min hard cap stays under CI's 30-min
  # job timeout.
  #
  # This is the gate of record for components whose Julia/MTK build OOMs the
  # GitHub runner (currently components/gaschem/geoschem_fullchem.esm — see
  # the ESM_TESTS_SKIP_PATTERNS env var on the julia-test job above).
  #
  # continue-on-error: true while Python-runner-gap follow-up beads (filed
  # off mdl-w1j: ESS fastjx symbol resolution, ESS water.esm flatten, ESS
  # cloud_albedo algebraic-only support, ESM superfast tolerance recalibration)
  # are still open. Flip to required once those land — tracked under mdl-lvu's
  # third done criterion.
  python-inline-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # Install the canonical Python runner from EarthSciSerialization main.
      # The package isn't on PyPI yet (matching the unregistered Julia state
      # handled by setup_polecat_env.sh).
      - name: Install earthsci_toolkit (from EarthSciSerialization main)
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "earthsci_toolkit @ git+https://github.com/EarthSciML/EarthSciSerialization.git@main#subdirectory=packages/earthsci_toolkit"
      - name: Run Python inline-test gate (cse=False, per-file subprocess)
        run: |
          python tools/run_esm_inline_tests.py --junit-xml python-esm-tests.xml
      - name: Upload junit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-esm-inline-tests-junit
          path: python-esm-tests.xml
          if-no-files-found: ignore
